name: Mark stale issues and pull requests

on:
  schedule:
  - cron: "30 1 * * *"

jobs:
  stale:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/stale@v10
      with:
        stale-issue-message: "Acest issue a fost marcat automat ca inactiv deoarece nu a avut activitate recentă. Va fi închis dacă nu există activitate suplimentară."
        stale-pr-message: "Acest pull request a fost marcat automat ca inactiv deoarece nu a avut activitate recentă. Va fi închis dacă nu există activitate suplimentară."
        stale-issue-label: 'no-issue-activity'
        stale-pr-label: 'no-pr-activity'
        days-before-stale: 30
        days-before-close: 365
        exempt-issue-labels: 'awaiting-approval,work-in-progress'
        exempt-pr-labels: 'awaiting-approval,work-in-progress'
        repo-token: ${{ secrets.GITHUB_TOKEN }}
