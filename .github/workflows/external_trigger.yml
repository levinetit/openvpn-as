name: External Trigger Main

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  external-trigger-master:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificare versiune nouă OpenVPN AS și trigger rebuild
        run: |
          if [ -n "${{ secrets.PAUSE_EXTERNAL_TRIGGER_OPENVPN_AS_MASTER }}" ]; then
            echo "**** Trigger dezactivat via secret PAUSE_EXTERNAL_TRIGGER_OPENVPN_AS_MASTER ****"
            exit 0
          fi

          # Obține cea mai recentă versiune din repo-ul oficial (noble = Ubuntu 24.04)
          EXT_RELEASE=$(curl -sX GET http://as-repository.openvpn.net/as/debian/dists/noble/main/binary-amd64/Packages.gz \
            | gunzip -c | grep -A 7 -m 1 'Package: openvpn-as' | awk -F ': ' '/Version/{print $2;exit}')

          if [ -z "${EXT_RELEASE}" ] || [ "${EXT_RELEASE}" == "null" ]; then
            echo "**** Nu s-a putut obține versiunea externă, ieșire ****"
            exit 1
          fi
          EXT_RELEASE=$(echo ${EXT_RELEASE} | sed 's/[~,%@+;:/]//g')
          echo "**** Versiune externă disponibilă: ${EXT_RELEASE} ****"

          # Obține versiunea imaginii curente de pe Docker Hub
          IMAGE_VERSION=$(curl -s "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USER }}/openvpn-as/tags/latest/" \
            | jq -r '.last_updated // empty' | cut -c1-10 || echo "unknown")
          CURRENT_TAG=$(curl -s "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USER }}/openvpn-as/tags/?page_size=10" \
            | jq -r '.results[].name' | grep -v latest | sort -V | tail -1 || echo "none")
          echo "**** Tag curent pe Docker Hub: ${CURRENT_TAG} ****"

          # Trigger rebuild prin workflow_dispatch pe docker-image.yml
          echo "**** Declanșare rebuild pentru versiunea ${EXT_RELEASE} ****"
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"ref":"master"}' \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/docker-image.yml/dispatches
          echo "**** Rebuild declanșat cu succes ****"
